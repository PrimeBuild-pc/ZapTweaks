name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage --no-test-assets
        continue-on-error: true

      - name: Verify coverage file exists
        shell: pwsh
        run: |
          if (Test-Path "coverage/lcov.info") {
            Write-Host "Coverage file found" 
            $size = (Get-Item "coverage/lcov.info").Length
            Write-Host "Coverage file size: $size bytes"
          } else {
            Write-Host "Coverage file not found, creating empty report..."
            New-Item -Path "coverage" -ItemType Directory -Force | Out-Null
            "TN:" | Out-File -FilePath "coverage/lcov.info"
          }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: flutter
          name: flutter-coverage
          fail_ci_if_error: false
          verbose: true
