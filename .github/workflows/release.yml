name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate tag and project version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $projectVersion = ((Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches[0].Groups[1].Value).Split('+')[0]
          if ($tagVersion -ne $projectVersion) {
            throw "Tag version $tagVersion does not match pubspec version $projectVersion"
          }

      - name: Analyze and test
        run: |
          flutter analyze
          flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build portable package
        shell: pwsh
        run: ./build_portable.ps1 -SkipFlutterBuild

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          gh release create "${{ github.ref_name }}" `
            "output/ZapTweaks_Portable.zip" `
            "output/ZapTweaks_Setup_v$version.exe" `
            --verify-tag `
            --title "ZapTweaks v$version" `
            --generate-notes
